name: "SmartLogix - Destroy Infrastructure"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY to confirm'
        required: true

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_environment:   ${{ vars.ENVIRONMENT }}
  TF_VAR_project_name:  ${{ vars.PROJECT_NAME }}
  TF_VAR_owner_name:    ${{ vars.OWNER_NAME }}
  TF_VAR_aws_region:    ${{ vars.AWS_REGION }}
  TF_VAR_vpc_cidr:      ${{ vars.VPC_CIDR }}
  TF_VAR_aws_profile:   ""
  TF_VAR_db_password:   ${{ secrets.DB_PASSWORD }}
  TF_VAR_smtp_user:     ${{ secrets.SMTP_USER }}
  TF_VAR_smtp_pass:     ${{ secrets.SMTP_PASS }}
  TF_VAR_smtp_from:     ${{ secrets.SMTP_FROM }}
  TF_VAR_app_url:       ${{ vars.APP_URL }}

jobs:
  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DESTROY'
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9.0"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.BUCKET_BACKEND }}" \
            -backend-config="key=${{ vars.KEY_BACKEND }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
