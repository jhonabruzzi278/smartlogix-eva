name: "SmartLogix - Deploy Frontend"

on:
  push:
    branches: [main]
    paths:
      - 'Frontend/**'
  workflow_dispatch:

env:
  AWS_REGION:  ${{ vars.AWS_REGION }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT }}
  PROJECT:     ${{ vars.PROJECT_NAME }}

jobs:
  deploy:
    name: "Build & Deploy to S3"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Build
        working-directory: Frontend
        env:
          VITE_API_BASE_URL: ${{ vars.APP_URL }}
        run: npm run build

      - name: Deploy to S3
        run: |
          BUCKET="${ENVIRONMENT}-${PROJECT}-frontend"
          aws s3 sync Frontend/dist/ s3://${BUCKET}/ --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp Frontend/dist/index.html s3://${BUCKET}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Print frontend URL
        run: |
          BUCKET="${ENVIRONMENT}-${PROJECT}-frontend"
          echo ""
          echo "=========================================="
          echo "  Frontend: http://${BUCKET}.s3-website-${AWS_REGION}.amazonaws.com"
          echo "=========================================="
