name: "SmartLogix - Deploy Application"

on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:  ${{ vars.AWS_REGION }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT }}
  PROJECT:     ${{ vars.PROJECT_NAME }}
  CLUSTER:     ${{ vars.ENVIRONMENT }}-${{ vars.PROJECT_NAME }}

jobs:
  build-and-deploy:
    name: "Build, Push & Deploy"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=v$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build and push — orders-service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          REPO=$ECR_REGISTRY/$ENVIRONMENT-$PROJECT-orders-service-repo
          docker build -f Backend/orders-service/Dockerfile \
            -t $REPO:$IMAGE_TAG -t $REPO:latest Backend/
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:latest

      - name: Build and push — inventory-service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          REPO=$ECR_REGISTRY/$ENVIRONMENT-$PROJECT-inventory-service-repo
          docker build -f Backend/inventory-service/Dockerfile \
            -t $REPO:$IMAGE_TAG -t $REPO:latest Backend/
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:latest

      - name: Build and push — shipping-service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          REPO=$ECR_REGISTRY/$ENVIRONMENT-$PROJECT-shipping-service-repo
          docker build -f Backend/shipping-service/Dockerfile \
            -t $REPO:$IMAGE_TAG -t $REPO:latest Backend/
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:latest

      - name: Build and push — notification-service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          REPO=$ECR_REGISTRY/$ENVIRONMENT-$PROJECT-notification-service-repo
          docker build -f Backend/notification-service/Dockerfile \
            -t $REPO:$IMAGE_TAG -t $REPO:latest Backend/
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:latest

      - name: Build and push — nginx
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          REPO=$ECR_REGISTRY/$ENVIRONMENT-$PROJECT-nginx-repo
          docker build -t $REPO:$IMAGE_TAG -t $REPO:latest Backend/nginx/
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:latest

      - name: Build and push — postgres (with init-db.sql)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          cp Backend/init-db.sql Backend/postgres/init-db.sql
          REPO=$ECR_REGISTRY/$ENVIRONMENT-$PROJECT-postgres-repo
          docker build -t $REPO:$IMAGE_TAG -t $REPO:latest Backend/postgres/
          docker push $REPO:$IMAGE_TAG
          docker push $REPO:latest

      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $CLUSTER \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text

      - name: Wait for service to stabilize
        run: |
          aws ecs wait services-stable --cluster $CLUSTER --services $CLUSTER
          echo "Service stable"

      - name: Get nginx public IP
        run: |
          TASK_ARN=$(aws ecs list-tasks --cluster $CLUSTER --service-name nginx \
            --query 'taskArns[0]' --output text)

          ENI_ID=$(aws ecs describe-tasks --cluster $CLUSTER --tasks $TASK_ARN \
            --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value" \
            --output text)

          PUBLIC_IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids $ENI_ID \
            --query 'NetworkInterfaces[0].Association.PublicIp' \
            --output text)

          echo ""
          echo "=========================================="
          echo "  API Gateway: http://$PUBLIC_IP"
          echo "  Health:      http://$PUBLIC_IP/healthz"
          echo "  Orders:      http://$PUBLIC_IP/api/orders"
          echo "=========================================="
          echo "  Actualiza el Repository Variable APP_URL=http://$PUBLIC_IP"
          echo "=========================================="
