worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    location = /healthz {
      default_type application/json;
      return 200 '{"status":"UP","service":"smartlogix-api-gateway"}';
    }

    location /api/orders {
      set $orders_upstream http://orders-service:8081;
      proxy_pass $orders_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/customers {
      set $orders_upstream http://orders-service:8081;
      proxy_pass $orders_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/inventory {
      set $inventory_upstream http://inventory-service:8082;
      proxy_pass $inventory_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/sales {
      set $inventory_upstream http://inventory-service:8082;
      proxy_pass $inventory_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/shipments {
      set $shipping_upstream http://shipping-service:8084;
      proxy_pass $shipping_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/notifications {
      set $notification_upstream http://notification-service:8085;
      proxy_pass $notification_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/orders {
      rewrite ^/actuator/orders/?(.*)$ /actuator/$1 break;
      set $orders_upstream http://orders-service:8081;
      proxy_pass $orders_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/inventory {
      rewrite ^/actuator/inventory/?(.*)$ /actuator/$1 break;
      set $inventory_upstream http://inventory-service:8082;
      proxy_pass $inventory_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/shipments {
      rewrite ^/actuator/shipments/?(.*)$ /actuator/$1 break;
      set $shipping_upstream http://shipping-service:8084;
      proxy_pass $shipping_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/notifications {
      rewrite ^/actuator/notifications/?(.*)$ /actuator/$1 break;
      set $notification_upstream http://notification-service:8085;
      proxy_pass $notification_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      default_type application/json;
      return 404 '{"message":"Route not found"}';
    }
  }
}
