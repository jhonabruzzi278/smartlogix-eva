services:
  postgres-db:
    image: postgres:15-alpine
    container_name: smartlogix-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin123}
    command: >
      postgres
      -c shared_buffers=32MB
      -c effective_cache_size=64MB
      -c maintenance_work_mem=16MB
      -c wal_buffers=2MB
      -c max_connections=50
      -c work_mem=1MB
      -c max_wal_size=128MB
      -c min_wal_size=32MB
      -c random_page_cost=1.1
      -c max_worker_processes=2
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d postgres"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - smartlogix-net
    deploy:
      resources:
        limits:
          memory: 256M

  sqs-mock:
    image: softwaremill/elasticmq:1.6.7
    container_name: smartlogix-sqs-mock
    restart: unless-stopped
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
    healthcheck:
      test: ["CMD", "true"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - smartlogix-net
    deploy:
      resources:
        limits:
          memory: 128M

  orders-service:
    build:
      context: ./Backend
      dockerfile: orders-service/Dockerfile
    image: jonahbruzzi/orders-service:node
    container_name: smartlogix-orders
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      - POSTGRES_HOST=postgres-db
      - POSTGRES_PORT=5432
      - DB_URL=postgresql://postgres:admin123@postgres-db:5432/orders_db
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_SQS_ENDPOINT=http://sqs-mock:9324
      - ORDERS_QUEUE=orders-queue
      - INVENTORY_SERVICE_URL=http://inventory-service:8082
      - SHIPPING_SERVICE_URL=http://shipping-service:8084
      - SERVICE_NAME=orders-service
      - LOG_LEVEL=info
      - ALLOWED_ORIGINS=*
      - PORT=8081
    depends_on:
      postgres-db:
        condition: service_healthy
      sqs-mock:
        condition: service_started
    networks:
      - smartlogix-net
  inventory-service:
    build:
      context: ./Backend
      dockerfile: inventory-service/Dockerfile
    image: jonahbruzzi/inventory-service:node
    container_name: smartlogix-inventory
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      - POSTGRES_HOST=postgres-db
      - POSTGRES_PORT=5432
      - DB_URL=postgresql://postgres:admin123@postgres-db:5432/inventory_db
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_SQS_ENDPOINT=http://sqs-mock:9324
      - SHIPPING_QUEUE=shipping-queue
      - ORDERS_QUEUE=orders-queue
      - SERVICE_NAME=inventory-service
      - LOG_LEVEL=info
      - ALLOWED_ORIGINS=*
      - PORT=8082
    depends_on:
      postgres-db:
        condition: service_healthy
      sqs-mock:
        condition: service_started
    networks:
      - smartlogix-net
    deploy:
      resources:
        limits:
          memory: 128M

  shipping-service:
    build:
      context: ./Backend
      dockerfile: shipping-service/Dockerfile
    image: jonahbruzzi/shipping-service:node
    container_name: smartlogix-shipping
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      - POSTGRES_HOST=postgres-db
      - POSTGRES_PORT=5432
      - DB_URL=postgresql://postgres:admin123@postgres-db:5432/shipping_db
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_SQS_ENDPOINT=http://sqs-mock:9324
      - SHIPPING_QUEUE=shipping-queue
      - NOTIFICATION_SERVICE_URL=http://notification-service:8085
      - SERVICE_NAME=shipping-service
      - LOG_LEVEL=info
      - ALLOWED_ORIGINS=*
      - PORT=8084
    depends_on:
      postgres-db:
        condition: service_healthy
      sqs-mock:
        condition: service_started
    networks:
      - smartlogix-net
    deploy:
      resources:
        limits:
          memory: 128M

  notification-service:
    build:
      context: ./Backend
      dockerfile: notification-service/Dockerfile
    image: jonahbruzzi/notification-service:node
    container_name: smartlogix-notification
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      - POSTGRES_HOST=postgres-db
      - POSTGRES_PORT=5432
      - DB_URL=postgresql://postgres:admin123@postgres-db:5432/notification_db
      - SERVICE_NAME=notification-service
      - LOG_LEVEL=info
      - ALLOWED_ORIGINS=*
      - PORT=8085
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - smartlogix-net
    deploy:
      resources:
        limits:
          memory: 128M

  api-gateway:
    image: nginx:1.27-alpine
    container_name: smartlogix-api-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      orders-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      shipping-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - smartlogix-net
    deploy:
      resources:
        limits:
          memory: 32M

networks:
  smartlogix-net:
    driver: bridge

volumes:
  postgres_data:
