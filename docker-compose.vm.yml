services:
  postgres-db:
    image: postgres:15-alpine
    container_name: smartlogix-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin123
    command: >
      postgres
      -c shared_buffers=32MB
      -c effective_cache_size=64MB
      -c maintenance_work_mem=16MB
      -c wal_buffers=2MB
      -c max_connections=50
      -c work_mem=1MB
      -c max_wal_size=128MB
      -c min_wal_size=32MB
      -c random_page_cost=1.1
      -c max_worker_processes=2
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - smartlogix-net
    deploy:
      resources:
        limits:
          memory: 128M

  sqs-mock:
    image: softwaremill/elasticmq:latest
    container_name: smartlogix-sqs-mock
    restart: unless-stopped
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9324 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - smartlogix-net
    deploy:
      resources:
        limits:
          memory: 128M

  orders-service:
    image: jonahbruzzi/orders-service:latest
    container_name: smartlogix-orders
    restart: unless-stopped
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/orders_db
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_SQS_ENDPOINT=http://sqs-mock:9324
      - ORDERS_QUEUE=orders-queue
      - SHIPPING_QUEUE=shipping-queue
      - JAVA_TOOL_OPTIONS=-Xmx128m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=32m
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=3
    depends_on:
      postgres-db:
        condition: service_healthy
      sqs-mock:
        condition: service_started
    networks:
      - smartlogix-net
    deploy:
      resources:
        limits:
          memory: 320M

  inventory-service:
    image: jonahbruzzi/inventory-service:latest
    container_name: smartlogix-inventory
    restart: unless-stopped
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/inventory_db
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_SQS_ENDPOINT=http://sqs-mock:9324
      - SHIPPING_QUEUE=shipping-queue
      - JAVA_TOOL_OPTIONS=-Xmx128m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=32m
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=3
    depends_on:
      postgres-db:
        condition: service_healthy
      sqs-mock:
        condition: service_started
    networks:
      - smartlogix-net
    deploy:
      resources:
        limits:
          memory: 320M

  shipping-service:
    image: jonahbruzzi/shipping-service:latest
    container_name: smartlogix-shipping
    restart: unless-stopped
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/shipping_db
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_SQS_ENDPOINT=http://sqs-mock:9324
      - SHIPPING_QUEUE=shipping-queue
      - NOTIFICATION_SERVICE_URL=http://notification-service:8085
      - JAVA_TOOL_OPTIONS=-Xmx128m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=32m
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=3
    depends_on:
      postgres-db:
        condition: service_healthy
      sqs-mock:
        condition: service_started
    networks:
      - smartlogix-net
    deploy:
      resources:
        limits:
          memory: 320M

  notification-service:
    image: jonahbruzzi/notification-service:latest
    container_name: smartlogix-notification
    restart: unless-stopped
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/notification_db
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_SQS_ENDPOINT=http://sqs-mock:9324
      - NOTIFICATION_EVENTS_QUEUE=notification-events-queue
      - JAVA_TOOL_OPTIONS=-Xmx128m -Xms64m -XX:+UseSerialGC -XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=32m
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=3
    depends_on:
      postgres-db:
        condition: service_healthy
      sqs-mock:
        condition: service_started
    networks:
      - smartlogix-net
    deploy:
      resources:
        limits:
          memory: 320M

  api-gateway:
    image: nginx:alpine
    container_name: smartlogix-api-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - orders-service
      - inventory-service
      - shipping-service
      - notification-service
    networks:
      - smartlogix-net
    deploy:
      resources:
        limits:
          memory: 32M

networks:
  smartlogix-net:
    driver: bridge

volumes:
  postgres_data:
