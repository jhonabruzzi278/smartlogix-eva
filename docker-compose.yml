services:
  postgres-db:
    image: postgres:15-alpine
    container_name: smartlogix-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin123
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c max_connections=50
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartlogix-net

  orders-service:
    build:
      context: ./Backend
      dockerfile: orders-service/Dockerfile
    container_name: smartlogix-orders
    restart: unless-stopped
    environment:
      - DB_URL=postgresql://postgres:admin123@postgres-db:5432/orders_db
      - INVENTORY_SERVICE_URL=http://inventory-service:8082
      - SHIPPING_SERVICE_URL=http://shipping-service:8084
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
      - PORT=8081
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - APP_URL=${APP_URL}
      - JWT_SECRET=${JWT_SECRET:-smartlogix-jwt-secret-change-me}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-8h}
    ports:
      - "8081:8081"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - smartlogix-net

  inventory-service:
    build:
      context: ./Backend
      dockerfile: inventory-service/Dockerfile
    container_name: smartlogix-inventory
    restart: unless-stopped
    environment:
      - DB_URL=postgresql://postgres:admin123@postgres-db:5432/inventory_db
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
      - PORT=8082
    ports:
      - "8082:8082"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - smartlogix-net

  shipping-service:
    build:
      context: ./Backend
      dockerfile: shipping-service/Dockerfile
    container_name: smartlogix-shipping
    restart: unless-stopped
    environment:
      - DB_URL=postgresql://postgres:admin123@postgres-db:5432/shipping_db
      - NOTIFICATION_SERVICE_URL=http://notification-service:8085
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
      - PORT=8084
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - APP_URL=${APP_URL}
      - JWT_SECRET=${JWT_SECRET:-smartlogix-jwt-secret-change-me}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-8h}
    ports:
      - "8084:8084"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - smartlogix-net

  notification-service:
    build:
      context: ./Backend
      dockerfile: notification-service/Dockerfile
    container_name: smartlogix-notification
    restart: unless-stopped
    environment:
      - DB_URL=postgresql://postgres:admin123@postgres-db:5432/notification_db
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8080
      - PORT=8085
    ports:
      - "8085:8085"
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - smartlogix-net

  api-gateway:
    image: nginx:alpine
    container_name: smartlogix-api-gateway
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./Backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - orders-service
      - inventory-service
      - shipping-service
      - notification-service
    networks:
      - smartlogix-net

networks:
  smartlogix-net:
    driver: bridge

volumes:
  postgres_data:
